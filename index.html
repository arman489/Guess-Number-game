<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Guess Number</title>
</head>

<body>
    <header>
        <div>
            <img src="new logo.png" alt="" class="logo">
        </div>
        <h1>Guess Number</h1>
        <div class="icon-btn">
            <a href="https://github.com/arman489" target="_blank" rel="noopener noreferrer" id="git-link"><i class="fa-brands fa-github"></i></a>
        </div>

    </header>
    <div class="section">
        <div class="section-box">
            <p class="Para">I'm thinking of a number between 0 and 100. Can you guess it?You have 0 guesses remaining
            </p>
            <div class="Number-box">
                <h4>Your Guess ( 0-100 )</h4>
                <input type="number" class="input" placeholder="guess number" required >
                <p>Enter Number between 0 and 100</p>
            </div>
            <div class="btn-box">
                <button class="btn" id="submit">Submit Guess</button>
                <button class="btn" id="game"  >New Game</button>
            </div>
            <div class="">
                <h4 class="over"></h4>
                <p class="para-item"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
